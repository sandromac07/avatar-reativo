<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Reativo - Debug Pro</title>
    <style>
        :root { --bg-color: #121212; }
        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 20px;
            box-sizing: border-box;
        }
        #avatar-area {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            position: relative;
        }
        #avatar-container {
            position: relative;
            width: 500px;  
            height: 500px; 
            border: 2px dashed rgba(255, 255, 255, 0.2);
        }
        .idle-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            z-index: 1;
            display: none;
        }
        .mouth-img {
            position: absolute;
            z-index: 2;
            display: block; /* Mantém visível por padrão para ajuste inicial */
            object-fit: contain;
            outline: 1px dashed #ffeb3b; 
        }
        #control-panel {
            width: 350px;
            background: rgba(20, 20, 20, 0.95);
            border-left: 1px solid #333;
            height: 100vh;
            position: fixed;
            right: 0;
            top: 0;
            padding: 20px;
            box-sizing: border-box;
            overflow-y: auto;
            z-index: 100;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }
        h3 { border-bottom: 1px solid #444; padding-bottom: 8px; color: #2196f3; margin-top: 15px; }
        .control-group { margin-bottom: 15px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; color: #ccc; }
        .control-group label span { color: #2196f3; font-weight: bold; }
        input[type="range"] { width: 100%; }
        input[type="file"] { width: 100%; background: #222; padding: 8px; border-radius: 4px; border: 1px solid #444; color: #ccc; font-size: 12px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4caf50; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        button:hover { opacity: 0.9; }
        .secondary-btn { background: #555; }
        .test-btn { background: #ff9800; }
        .status-box { background: #000; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .status-ok { color: #4caf50; }
        .status-error { color: #f44336; }
        .volume-bar-container { width: 100%; height: 20px; background: #222; margin-top: 8px; border-radius: 4px; overflow: hidden; position: relative; border: 1px solid #444; }
        #volume-bar { height: 100%; width: 0%; background: #4caf50; transition: width 0.02s ease; }
        #gate-indicator { position: absolute; top: 0; bottom: 0; width: 3px; background: #f44336; }
    </style>
</head>
<body>

    <div id="avatar-area">
        <div id="avatar-container">
            <img id="idle" class="idle-img" src="" alt="Parado">
            <img id="mouth" class="mouth-img" src="" alt="Boca">
        </div>
    </div>

    <div id="control-panel">
        <h3>System Status</h3>
        <div class="status-box">
            <div>Corpo (Idle): <span id="status-idle" class="status-error">Não carregado</span></div>
            <div>Boca (Mouth): <span id="status-mouth" class="status-error">Não carregado</span></div>
            <div>Microfone: <span id="status-mic" class="status-error">Desativado</span></div>
            <div>Volume Real: <span id="status-vol-num">0</span></div>
        </div>

        <h3>1. Importar GIFs</h3>
        <div class="control-group">
            <label>Personagem Parado:</label>
            <input type="file" id="upload-idle" accept="image/gif">
        </div>
        <div class="control-group">
            <label>Recorte da Boca:</label>
            <input type="file" id="upload-mouth" accept="image/gif">
        </div>

        <h3>2. Controle de Áudio</h3>
        <button id="start-btn">Ativar Microfone</button>
        <button id="test-mouth-btn" class="test-btn">Segure para Testar Boca Animada</button>
        
        <div class="control-group">
            <label for="gate-slider">Noise Gate (Corte): <span id="gate-value">15</span></label>
            <input type="range" id="gate-slider" min="0" max="100" value="15">
            <div class="volume-bar-container">
                <div id="volume-bar"></div>
                <div id="gate-indicator"></div>
            </div>
        </div>

        <h3>3. Posicionamento</h3>
        <div class="control-group"><label>Vertical (Top): <span id="top-value">180</span>px</label><input type="range" id="slider-top" min="-100" max="600" value="180"></div>
        <div class="control-group"><label>Horizontal (Left): <span id="left-value">150</span>px</label><input type="range" id="slider-left" min="-100" max="600" value="150"></div>
        <div class="control-group"><label>Largura (Width): <span id="width-value">80</span>px</label><input type="range" id="slider-width" min="10" max="500" value="80"></div>
        <div class="control-group"><label>Altura (Height): <span id="height-value">50</span>px</label><input type="range" id="slider-height" min="10" max="500" value="50"></div>

        <h3>Fundo</h3>
        <button class="secondary-btn" id="bg-btn">Chroma Key (Verde)</button>
        <button class="secondary-btn" id="border-btn">Ocultar Linhas Guia</button>
    </div>

    <script>
        const idle = document.getElementById('idle');
        const mouth = document.getElementById('mouth');
        const uploadIdle = document.getElementById('upload-idle');
        const uploadMouth = document.getElementById('upload-mouth');
        
        const statusIdle = document.getElementById('status-idle');
        const statusMouth = document.getElementById('status-mouth');
        const statusMic = document.getElementById('status-mic');
        const statusVolNum = document.getElementById('status-vol-num');

        const sliders = {
            top: { input: document.getElementById('slider-top'), val: document.getElementById('top-value'), unit: 'px', prop: 'top' },
            left: { input: document.getElementById('slider-left'), val: document.getElementById('left-value'), unit: 'px', prop: 'left' },
            width: { input: document.getElementById('slider-width'), val: document.getElementById('width-value'), unit: 'px', prop: 'width' },
            height: { input: document.getElementById('slider-height'), val: document.getElementById('height-value'), unit: 'px', prop: 'height' }
        };

        const gateSlider = document.getElementById('gate-slider');
        const gateValue = document.getElementById('gate-value');
        const volumeBar = document.getElementById('volume-bar');
        const gateIndicator = document.getElementById('gate-indicator');
        
        const startBtn = document.getElementById('start-btn');
        const testMouthBtn = document.getElementById('test-mouth-btn');
        const bgBtn = document.getElementById('bg-btn');
        const borderBtn = document.getElementById('border-btn');

        let audioContext, analyser, dataArray;
        let micActive = false;
        let manualTest = false;

        function updateImgStatus() {
            if (idle.src && idle.src.startsWith('data:')) {
                statusIdle.innerText = "OK"; statusIdle.className = "status-ok";
                idle.style.display = 'block';
            }
            if (mouth.src && mouth.src.startsWith('data:')) {
                statusMouth.innerText = "OK"; statusMouth.className = "status-ok";
            }
        }

        function handleUpload(file, storageKey, imgElement) {
            const reader = new FileReader();
            reader.onload = function(e) {
                localStorage.setItem(storageKey, e.target.result);
                imgElement.src = e.target.result;
                updateImgStatus();
            };
            reader.readAsDataURL(file);
        }

        uploadIdle.addEventListener('change', (e) => { if (e.target.files[0]) handleUpload(e.target.files[0], 'db-idle', idle); });
        uploadMouth.addEventListener('change', (e) => { if (e.target.files[0]) handleUpload(e.target.files[0], 'db-mouth', mouth); });

        function updateStyles() {
            Object.keys(sliders).forEach(key => {
                const item = sliders[key];
                mouth.style[item.prop] = item.input.value + item.unit;
                item.val.innerText = item.input.value;
                localStorage.setItem(`db-sl-${key}`, item.input.value);
            });
            gateValue.innerText = gateSlider.value;
            gateIndicator.style.left = gateSlider.value + '%';
            localStorage.setItem('db-gate', gateSlider.value);
        }

        Object.keys(sliders).forEach(key => sliders[key].input.addEventListener('input', updateStyles));
        gateSlider.addEventListener('input', updateStyles);

        // Teste Manual Secundário (Clique e segure para forçar a boca)
        testMouthBtn.addEventListener('mousedown', () => { manualTest = true; mouth.style.display = 'block'; });
        window.addEventListener('mouseup', () => { manualTest = false; if(micActive === false) mouth.style.display = 'block'; });

        bgBtn.addEventListener('click', () => {
            document.documentElement.style.setProperty('--bg-color', document.documentElement.style.getPropertyValue('--bg-color') === '#00ff00' ? '#121212' : '#00ff00');
        });

        borderBtn.addEventListener('click', () => {
            const container = document.getElementById('avatar-container');
            container.style.border = container.style.border === 'none' ? '2px dashed rgba(255, 255, 255, 0.2)' : 'none';
            mouth.style.outline = mouth.style.outline === 'none' ? '1px dashed #ffeb3b' : 'none';
        });

        startBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Correção essencial de segurança do Chrome/Edge
                if (audioContext.state === 'suspended') {
                    await audioContext.resume();
                }

                const source = audioContext.createMediaStreamSource(stream);
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                source.connect(analyser);
                
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micActive = true;
                
                statusMic.innerText = "Conectado";
                statusMic.className = "status-ok";
                startBtn.style.background = "#555";
                startBtn.innerText = "Microfone Ativo";

                function loop() {
                    if (manualTest) { requestAnimationFrame(loop); return; }

                    analyser.getByteFrequencyData(dataArray);
                    let total = 0;
                    for (let i = 0; i < dataArray.length; i++) { total += dataArray[i]; }
                    let average = total / dataArray.length;
                    
                    // Mapeamento dinâmico de ganho de volume
                    let volume = Math.min((average / 128) * 100, 100);
                    
                    volumeBar.style.width = volume + '%';
                    statusVolNum.innerText = Math.round(volume);

                    let thresh = parseFloat(gateSlider.value);
                    
                    // Se houver som acima do gate, mostra a boca. Caso contrário, esconde.
                    if (volume > thresh) {
                        mouth.style.display = 'block';
                    } else {
                        mouth.style.display = 'none';
                    }

                    requestAnimationFrame(loop);
                }
                loop();

            } catch (err) {
                statusMic.innerText = "Erro / Bloqueado";
                statusMic.className = "status-error";
                alert("Clique no cadeado da barra de endereço e permita o Microfone!");
            }
        });

        function load() {
            Object.keys(sliders).forEach(key => {
                const v = localStorage.getItem(`db-sl-${key}`);
                if (v !== null) sliders[key].input.value = v;
            });
            const g = localStorage.getItem('db-gate');
            if (g !== null) gateSlider.value = g;

            const i = localStorage.getItem('db-idle');
            if (i) idle.src = i;
            const m = localStorage.getItem('db-mouth');
            if (m) mouth.src = m;

            updateImgStatus();
            updateStyles();
        }
        load();
    </script>
</body>
</html>
